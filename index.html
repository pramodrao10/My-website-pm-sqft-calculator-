<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sqft Calculator</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eee;
}

.app{
max-width:360px;
margin:auto;
background:#fff;
min-height:100vh;
padding:10px;
box-sizing:border-box;
}

h3{
text-align:center;
margin:5px 0;
}

/* Select */
select{
width:100%;
padding:6px;
margin:5px 0;
font-size:13px;
}

/* Table Compact */
table{
width:100%;
table-layout:fixed;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:4px;
font-size:11px;
text-align:center;
}

/* Column Size */
th:nth-child(1){width:30px;}
th:nth-child(2){width:70px;}
th:nth-child(3){width:70px;}
th:nth-child(4){width:60px;}

input{
width:55px;
padding:3px;
font-size:11px;
}

/* Button */
button{
width:100%;
padding:8px;
margin-top:8px;
background:#007bff;
color:white;
border:none;
font-size:13px;
}

.total{
text-align:center;
margin-top:8px;
font-weight:bold;
font-size:14px;
}
</style>

</head>

<body>

<div class="app">

<h3>Sqft Calculator</h3>

<select onchange="setSize(this)">
<option value="">Select Size</option>
<option value="3x6">3 × 6</option>
<option value="6x12">6 × 12</option>
<option value="9x12">9 × 12</option>
<option value="12x12">12 × 12</option>
</select>

<table id="tbl">
<tr>
<th>No</th>
<th>L</th>
<th>W</th>
<th>Sqft</th>
</tr>

<tr>
<td>1</td>
<td><input type="number" oninput="calc(this)"></td>
<td><input type="number" oninput="calc(this)"></td>
<td class="sq">0</td>
</tr>

</table>

<button onclick="addRow()">Add Row</button>

<div class="total">
Total: <span id="tot">0</span>
</div>

</div>

<script>

// Size select auto fill
function setSize(sel){

let v = sel.value
if(!v) return

let p = v.split("x")

let t = document.getElementById("tbl")
let r = t.rows[t.rows.length-1]

r.children[1].children[0].value = p[0]
r.children[2].children[0].value = p[1]

calc(r.children[1].children[0])

}

// Calculate sqft
function calc(el){

let r = el.parentElement.parentElement

let l = parseFloat(r.children[1].children[0].value) || 0
let w = parseFloat(r.children[2].children[0].value) || 0

let s = (l * w) / 144

r.children[3].innerText = s.toFixed(2)

total()

}

// Total calculation
function total(){

let t = 0

document.querySelectorAll(".sq").forEach(e=>{
t += parseFloat(e.innerText) || 0
})

document.getElementById("tot").innerText = t.toFixed(2)

}

// Add new row
function addRow(){

let t = document.getElementById("tbl")
let n = t.rows.length

let r = t.insertRow()

r.innerHTML = `
<td>${n}</td>
<td><input type="number" oninput="calc(this)"></td>
<td><input type="number" oninput="calc(this)"></td>
<td class="sq">0</td>
`

}

</script>

</body>
</html>
