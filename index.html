<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sqft Calculator</title>

<style>
body{margin:0;font-family:Arial;background:#eee;}

.app{
max-width:360px;
margin:auto;
background:#fff;
min-height:100vh;
padding:10px;
}

h3{text-align:center;margin:5px 0;}

select{
width:100%;
padding:6px;
margin:8px 0;
font-size:13px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:4px;
font-size:11px;
text-align:center;
}

input{
width:60px;
padding:4px;
}

button.main{
width:100%;
padding:8px;
margin-top:8px;
background:#007bff;
color:#fff;
border:none;
}

.total{
text-align:center;
margin-top:10px;
font-weight:bold;
font-size:15px;
}
</style>

</head>

<body>

<div class="app">

<h3>Sqft Calculator</h3>

<!-- SIZE MODE -->
<select id="mode">
<option value="auto">3-6-9-12 (Auto)</option>
<option value="inch">Inch to Inch</option>
</select>

<table id="tbl">
<tr>
<th>No</th>
<th>L (inch)</th>
<th>W (inch)</th>
<th>Sqft</th>
</tr>

<tr>
<td>1</td>
<td><input type="number" step="0.01" oninput="calc(this)"></td>
<td><input type="number" step="0.01" oninput="calc(this)"></td>
<td class="sq">0</td>
</tr>

</table>

<button class="main" onclick="addRow()">Add Row</button>

<div class="total">
Total Sqft: <span id="tot">0</span>
</div>

</div>

<script>

//  INFINITE 3-6-9-12 (MULTIPLE OF 3)
function fixSize(v){
if(v <= 0) return 0;
return Math.ceil(v / 3) * 3;
}

// CALCULATION
function calc(el){

let mode = document.getElementById("mode").value;

let r = el.parentElement.parentElement;

let l = parseFloat(r.children[1].children[0].value) || 0;
let w = parseFloat(r.children[2].children[0].value) || 0;

// calculation ke liye alag variable
let calcL = l;
let calcW = w;

// AUTO MODE
if(mode === "auto"){
calcL = fixSize(l);
calcW = fixSize(w);
}

// SQFT
let sqft = (calcL * calcW) / 144;

r.children[3].innerText = sqft.toFixed(2);

total();
}

// TOTAL
function total(){

let t = 0;

document.querySelectorAll(".sq").forEach(e=>{
t += parseFloat(e.innerText) || 0;
});

document.getElementById("tot").innerText = t.toFixed(2);
}

// ADD ROW
function addRow(){

let t = document.getElementById("tbl");
let n = t.rows.length;

let r = t.insertRow();

r.innerHTML = `
<td>${n}</td>
<td><input type="number" step="0.01" oninput="calc(this)"></td>
<td><input type="number" step="0.01" oninput="calc(this)"></td>
<td class="sq">0</td>
`;
}

</script>

</body>
</html>
